<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Mangement System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="project-name">PRODUCT MANAGEMENT SYSTEM</h1>


    <section id="input-data">
        <input type="text" id="title" placeholder="title">
        <div id="finance">
            <input type="number" id="price" placeholder="price">
            <input type="number" id="taxes" placeholder="taxes">
            <input type="number" id="ads" placeholder="ads">
            <input type="number" id="discount" placeholder="discount">
        </div>
        <input type="number" id="count" placeholder="count">
        <input type="text" id="category" placeholder="Category">
        <button id="create">Create Product</button>
    </section>


    <section id="search-delete-place">
        <input type="text" id="search" placeholder="Search">

        <div id="all">
            <button id="all">delete all</button>

        </div>
    </section>


    <section id="products">
        <div id="titles-bar">
            <table>
                <tr>
                    <th>id</th>
                    <th>title</th>
                    <th>price</th>
                    <th>taxes</th>
                    <th>ads</th>
                    <th>discount</th>
                    <th>total</th>
                    <th>category</th>
                    <th>update</th>
                    <th>delete</th>
                </tr>
                    
                <tbody id="box">
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td>


                </tbody>

            </table>
        </div>


    </section>
    <script src="script.js"></script>
</body>
</html>
